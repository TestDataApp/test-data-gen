<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TestDataGen</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
  
    gtag('js', new Date());
    gtag('config', 'G-JFE7XL3TNK');
  </script>
</head>
<body>

<div class="container">
  <h1>⚙️ MockData Builder</h1>
  <p>Generate QA-friendly test data instantly</p>

  <div class="controls">
    <div>
      <label>Data Type</label>
      <select id="type" onchange="handleTypeChange()" onkeydown="if(event.key === 'Enter') generate()">
        <optgroup label="Email">
          <option value="email:random">Random Domain</option>
          <option value="email:gmail.com">gmail.com</option>
          <option value="email:multi-part-domain.co.uk">multi-part-domain.co.uk</option>
          <option value="email:test.com">test.com</option>
          <option value="email:verylongdomainnameexample.com">Very Long Domain</option>
          <option value="email:outlook.com">outlook.com</option>
          <option value="email:enterprise.org">enterprise.org</option>
          <option value="email:startup.io">startup.io</option>
        </optgroup>
        <optgroup label="Phone">
          <option value="phone:+91">India (+91)</option>
          <option value="phone:+1">USA (+1)</option>
          <option value="phone:+44">UK (+44)</option>
        </optgroup>
        <optgroup label="JSON - Basic">
          <option value="json:basic">Basic User</option>
          <option value="json:auth">Auth Payload</option>
        </optgroup>
        <optgroup label="JSON - E-commerce">
          <option value="json:ecommerce">Simple Cart</option>
          <option value="json:order">Order / Checkout</option>
        </optgroup>
        <optgroup label="JSON - User Data">
          <option value="json:address">User with Address</option>
        </optgroup>
        <optgroup label="JSON - API Testing">
          <option value="json:pagination">Pagination</option>
          <option value="json:search">Search / Filter</option>
        </optgroup>
        <optgroup label="JSON - File Testing">
          <option value="json:file">File Metadata</option>
        </optgroup>
        <optgroup label="JSON - Headers">
          <option value="json:headers">Auth Headers</option>
        </optgroup>
      </select>
    </div>

    <div style="position: relative;">
      <label>Count</label>
      <input type="number" id="count" value="1" min="1" max="100" ondblclick="this.select()" onkeydown="if(event.key === 'Enter') generate()" />
      <span id="countError" class="error-msg"></span>
    </div>

    <div style="position: relative;">
      <label id="lengthLabel">Email Prefix (Length)</label>
      <input type="number" id="strLength" value="8" min="3" max="100" ondblclick="this.select()" onkeydown="if(event.key === 'Enter') generate()" />
      <span id="lengthError" class="error-msg"></span>
    </div>

    <button class="secondary-btn" onclick="generate()">✨ Generate</button>
  
  </div>

  <h3>Generated Output</h3>
  <pre id="output"></pre>
  <div class="output-actions">
    <button class="action-btn" onclick="copyOutput(this)">📋 Copy</button>
    <button class="action-btn" onclick="clearOutput()">🗑️ Clear</button>
  </div>

  <hr/>


  <!-- Collapsible Feedback -->
  <details class="feedback">
    <summary><b>Feedback</b> (optional)</summary>

    <p class="note">
      You can submit feedback anonymously. If you'd like a response, provide your email.
    </p>

    <label class="checkbox">
      <input type="checkbox" id="anonymous" checked onchange="toggleIdentity()" />
      Submit anonymously
    </label>

    <div id="identityFields" class="row" style="display:none;">
      <input id="name" placeholder="Your Name (optional)" />
      <input id="email" placeholder="Your Email (optional)" />
    </div>

    <textarea id="message" placeholder="Your feedback"></textarea>

    <button class="primary-btn" onclick="submitFeedback()">Send Feedback</button>
  </details>

</div>

<script src="app.js"></script>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
