<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TestDataGen</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
  
    gtag('js', new Date());
    gtag('config', 'G-JFE7XL3TNK');
  </script>
</head>
<body>

<div class="container">
  <h1>⚙️ MockData Builder</h1>
  <p>Generate QA-friendly test data instantly</p>

  <div class="controls">
    <div>
      <label>Type</label>
      <select id="type">
        <option value="email">Email</option>
        <option value="phone">Phone</option>
        <option value="json">JSON Payload</option>
      </select>
    </div>

    <div>
      <label>Count</label>
      <input type="number" id="count" value="1" min="1" max="100"/>
    </div>

    <div>
      <label>Country</label>
      <select id="country">
        <option value="+91">India (+91)</option>
        <option value="+1">USA (+1)</option>
        <option value="+44">UK (+44)</option>
      </select>
    </div>

    <div>
    <label>Schema (JSON)</label>

    <select id="schema">
    
    <!-- Basic -->
    <optgroup label="Basic">
      <option value="basic">Basic User</option>
      <option value="auth">Auth Payload</option>
    </optgroup>

    <!-- E-commerce -->
    <optgroup label="E-commerce">
      <option value="ecommerce">Simple Cart</option>
      <option value="order">Order / Checkout</option>
    </optgroup>

    <!-- User & Address -->
    <optgroup label="User Data">
      <option value="address">User with Address</option>
    </optgroup>

    <!-- API Testing -->
    <optgroup label="API Testing">
      <option value="pagination">Pagination</option>
      <option value="search">Search / Filter</option>
    </optgroup>

    <!-- File & Upload -->
    <optgroup label="File Testing">
      <option value="file">File Metadata</option>
    </optgroup>

    <!-- Headers -->
    <optgroup label="Headers">
      <option value="headers">Auth Headers</option>
    </optgroup>

    </select>
    </div>

    <button class="secondary-btn" onclick="generate()">✨ Generate</button>
  
  </div>

  <h3>Generated Output</h3>
  <pre id="output"></pre>
  <div class="output-actions">
    <button class="action-btn" onclick="copyOutput(this)">📋 Copy</button>
    <button class="action-btn" onclick="clearOutput()">🗑️ Clear</button>
  </div>

  <hr/>


  <!-- Collapsible Feedback -->
  <details class="feedback">
    <summary><b>Feedback</b> (optional)</summary>

    <p class="note">
      You can submit feedback anonymously. If you'd like a response, provide your email.
    </p>

    <label class="checkbox">
      <input type="checkbox" id="anonymous" checked onchange="toggleIdentity()" />
      Submit anonymously
    </label>

    <div id="identityFields" class="row" style="display:none;">
      <input id="name" placeholder="Your Name (optional)" />
      <input id="email" placeholder="Your Email (optional)" />
    </div>

    <textarea id="message" placeholder="Your feedback"></textarea>

    <button class="primary-btn" onclick="submitFeedback()">Send Feedback</button>
  </details>

</div>

<script src="app.js"></script>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
